services:
  db:
    image: postgres:16-alpine
    container_name: serve_os_db_prod
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /mnt/volume-hel1-1/serve-os-backend/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: serve_os_minio_prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    volumes:
      - /mnt/volume-hel1-1/serve-os-backend/minio:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API — point S3_ENDPOINT and S3_PUBLIC_URL here
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal
      - shared
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ghcr.io/albertbarsegyan/serve-os-backend:latest
    container_name: serve_os_backend_prod
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: [ "node", "dist/main.js" ]
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - shared
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
  shared:
    external: true
