services:
  db:
    image: postgres:16-alpine
    container_name: serve_os_db_dev
    restart: unless-stopped
    env_file:
      - .env.development
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - serve_os_network_dev

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: serve_os_app_dev
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env.development
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    command: npm run start:dev
    depends_on:
      db:
        condition: service_healthy
    networks:
      - serve_os_network_dev
      - serve_os_shared

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: serve_os_migrate_dev
    env_file:
      - .env.development

    volumes:
      - node_modules_dev:/app/node_modules
    command: npm run migration:dev:run
    depends_on:
      db:
        condition: service_healthy
    networks:
      - serve_os_network_dev

  minio:
    image: minio/minio
    container_name: serve_os_minio_dev
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    networks:
      - serve_os_network_dev

  minio-init:
    image: minio/mc
    container_name: serve_os_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/serve-os-dev;
        printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":[\"*\"]},\"Action\":[\"s3:GetObject\"],\"Resource\":[\"arn:aws:s3:::serve-os-dev/public/*\"]}]}' > /tmp/bucket-policy.json;
        mc anonymous set-json /tmp/bucket-policy.json local/serve-os-dev;
        mc ilm rule add --expire-days 1 --prefix 'temp/' local/serve-os-dev;
      "
    networks:
      - serve_os_network_dev

  pgadmin:
    image: dpage/pgadmin4
    container_name: serve_os_pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - serve_os_network_dev
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin

volumes:
  postgres_data_dev:
  pgadmin_data_dev:
  node_modules_dev:
  minio_data_dev:

networks:
  serve_os_network_dev:
    driver: bridge
  serve_os_shared:
    external: true
