name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/albertbarsegyan/serve-os-backend

jobs:
  # ──────────────────────────────────────────────
  # Gate: lint + tests must pass before we build
  # ──────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint:check
      - name: Unit tests
        run: npm test

  # ──────────────────────────────────────────────
  # Build image → push to GHCR → SSH deploy
  # ──────────────────────────────────────────────
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write .env
        run: |
          {
            echo "NODE_ENV=${{ secrets.NODE_ENV }}"
            echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}"
            echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "POSTGRES_DB_SSL=${{ secrets.POSTGRES_DB_SSL }}"
            echo "MIGRATION_POSTGRES_HOST=${{ secrets.MIGRATION_POSTGRES_HOST }}"
            echo "MIGRATION_POSTGRES_PORT=${{ secrets.MIGRATION_POSTGRES_PORT }}"
            echo "PORT=${{ secrets.PORT }}"
            echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
            echo "JWT_ACCESS_EXPIRES_IN=${{ secrets.JWT_ACCESS_EXPIRES_IN }}"
            echo "JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}"
            echo "MASTER_ENCRYPTION_KEY=${{ secrets.MASTER_ENCRYPTION_KEY }}"
            echo "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}"
            echo "S3_REGION=${{ secrets.S3_REGION }}"
            echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}"
            echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}"
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}"
            echo "S3_PUBLIC_URL=${{ secrets.S3_PUBLIC_URL }}"
            echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}"
            echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}"
          } > .env

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.prod.yml,.env"
          target: /opt/serve-os-backend/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          # GHCR_TOKEN is forwarded as an env var to the remote script so it
          # never appears in plain text in the workflow logs.
          envs: GHCR_TOKEN
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u albertbarsegyan --password-stdin
            cd /opt/serve-os-backend
            chmod 600 .env

            # Pull the new app image
            docker compose -f docker-compose.prod.yml --env-file .env pull app

            # Run pending TypeORM migrations.
            # docker compose run (without --no-deps) starts the db service and
            # waits for it to pass its healthcheck before executing migrations.
            docker compose -f docker-compose.prod.yml --env-file .env run --rm app npm run migration:prod:run

            # Bring the full stack up (db already healthy, app restarts with new image)
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
